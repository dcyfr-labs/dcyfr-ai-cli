sonar.sources=src,bin
sonar.tests=tests,src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.d.ts,**/docs/**,**/examples/**,**/scripts/**,**/data/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Paths excluded from coverage measurement (still analyzed for bugs/smells/etc.)
# These are integration-heavy modules whose meaningful behaviour requires real
# OS / process / filesystem interaction; unit-test mocks would not produce
# coverage of any value. Tracked for future integration-test work.
#   - src/daemon/**       — launchd/systemd lifecycle, child process management,
#                           queue persistence, file watcher; needs real OS state
#   - src/health/dashboard.ts, sparkline.ts — terminal-rendered ANSI dashboard
#                           (visual integration — ink/blessed-ish), tested via
#                           manual smoke runs, not unit assertions
#   - src/health/state.ts — long-running state aggregator that reads from
#                           daemon queue + LaunchAgent plist; covered by daemon
#                           integration tests when the test harness exists
sonar.coverage.exclusions=src/daemon/**,src/health/dashboard.ts,src/health/sparkline.ts,src/health/state.ts
